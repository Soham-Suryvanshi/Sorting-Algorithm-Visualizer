<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Algorithm Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
  
  <main class="visualizer-section">
    <div id="bars-container"></div>
    
    <div class="controls-panel">
      <button id="bubble-btn">⚙️ Run Bubble Sort</button>
      <div style="border-left: 1px solid rgba(255,255,255,0.1); height: 25px; margin: 0 0.5rem;"></div>
      <button id="backward-btn">⏮️ Back</button>
      <button id="pause-btn">⏸️ Pause</button>
      <button id="play-btn">▶️ Play</button>
      <button id="forward-btn">⏭️ Next</button>
    </div>
  </main>

  <aside class="sidebar-section">
    <div id="pseudo-code-panel">
      <div class="code-line" data-line="1">for i from 0 to N-1</div>
      <div class="code-line" data-line="2">  for j from 0 to N-i-1</div>
      <div class="code-line" data-line="3">    if array[j] > array[j+1] swap</div>
    </div>
    
    <div id="explanation-box">
      Select an algorithm and click play to begin the step-by-step trace.
    </div>
  </aside>

</div>
<script src="algorithm.js"></script>
<script src="renderer.js"></script>
<script src="engine.js"></script>
</body>
</html>
